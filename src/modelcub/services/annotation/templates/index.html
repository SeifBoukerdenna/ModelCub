<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModelCub Annotation Studio</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #0f172a;
            --bg-light: #1e293b;
            --bg-lighter: #334155;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --border: #475569;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-light);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats {
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.9;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
        }

        .image-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .image-item {
            padding: 12px;
            margin: 5px 0;
            background: var(--bg-lighter);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .image-item:hover {
            background: var(--border);
            transform: translateX(5px);
        }

        .image-item.active {
            background: var(--primary);
            color: white;
        }

        .image-item-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
        }

        .annotation-badge {
            background: var(--secondary);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            height: 60px;
            background: var(--bg-light);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }

        .tool-group {
            display: flex;
            gap: 10px;
            padding: 0 15px;
            border-right: 1px solid var(--border);
        }

        .tool-group:last-child {
            border-right: none;
            margin-left: auto;
        }

        .tool-btn {
            padding: 8px 16px;
            background: var(--bg-lighter);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tool-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .tool-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .canvas-container {
            flex: 1;
            display: flex;
            position: relative;
            background: var(--bg);
            overflow: hidden;
        }

        .canvas-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #annotationCanvas {
            max-width: 100%;
            max-height: 100%;
            cursor: crosshair;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .right-panel {
            width: 320px;
            background: var(--bg-light);
            border-left: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
        }

        .panel-section {
            margin-bottom: 25px;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--primary);
        }

        .class-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .class-btn {
            padding: 10px;
            background: var(--bg-lighter);
            border: 2px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            text-align: center;
        }

        .class-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .class-btn.selected {
            background: var(--primary);
            border-color: var(--primary);
        }

        .annotation-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .annotation-item {
            padding: 12px;
            background: var(--bg-lighter);
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .annotation-label {
            font-weight: 500;
            color: var(--secondary);
        }

        .delete-btn {
            padding: 4px 8px;
            background: var(--danger);
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        .export-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .export-btn {
            padding: 12px;
            background: linear-gradient(135deg, var(--secondary), #059669);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }

        .nav-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: var(--bg-light);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        .nav-btn {
            padding: 10px 20px;
            background: var(--primary);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .image-counter {
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: var(--text);
            font-weight: 600;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-message {
            background: var(--danger);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 20px;
            text-align: center;
        }

        .shortcuts {
            position: fixed;
            bottom: 10px;
            right: 10px;
            padding: 10px;
            background: var(--bg-lighter);
            border-radius: 6px;
            font-size: 11px;
            opacity: 0.7;
            cursor: pointer;
        }

        .shortcuts:hover {
            opacity: 1;
        }

        /* Class Management */
        .class-manager-btn {
            background: var(--secondary);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            width: 100%;
        }

        .class-manager-btn:hover {
            background: #059669;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: var(--danger);
        }

        .class-list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: var(--bg-lighter);
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .class-list-item .class-number {
            background: var(--primary);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            flex-shrink: 0;
        }

        .class-list-item .class-name {
            flex: 1;
            padding: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
        }

        .class-list-item .class-actions {
            display: flex;
            gap: 5px;
        }

        .class-list-item button {
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-remove {
            background: var(--danger);
            color: white;
        }

        .add-class-input {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .add-class-input input {
            flex: 1;
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
        }

        .add-class-input button {
            padding: 10px 20px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Shortcuts Modal */
        .shortcuts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .shortcuts-category {
            background: var(--bg-lighter);
            padding: 15px;
            border-radius: 8px;
        }

        .shortcuts-category h3 {
            color: var(--primary);
            margin-bottom: 12px;
            font-size: 16px;
        }

        .shortcut-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .shortcut-item:last-child {
            border-bottom: none;
        }

        .shortcut-key {
            background: var(--bg);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            font-weight: bold;
        }

        .shortcut-desc {
            color: var(--text-dim);
            font-size: 13px;
        }

        /* Visual Feedback */
        .key-hint {
            position: absolute;
            background: var(--primary);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .key-hint.show {
            opacity: 1;
        }

        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-light);
            border-top: 1px solid var(--border);
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            z-index: 100;
        }

        .status-left,
        .status-right {
            display: flex;
            gap: 20px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-icon {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--secondary);
        }

        .class-badge {
            background: var(--primary);
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div id="loadingScreen" class="loading">
        <div class="spinner"></div>
    </div>

    <div class="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    🐻 ModelCub Annotate
                </div>
                <div class="stats">
                    <div class="stat-row">
                        <span>Total Images:</span>
                        <span id="totalImages">0</span>
                    </div>
                    <div class="stat-row">
                        <span>Annotated:</span>
                        <span id="annotatedImages">0</span>
                    </div>
                    <div class="stat-row">
                        <span>Progress:</span>
                        <span id="progressPercent">0%</span>
                    </div>
                </div>
            </div>

            <div class="image-list" id="imageList">
                <!-- Image items will be added here -->
            </div>
        </div>

        <div class="main-content">
            <div class="toolbar">
                <div class="tool-group">
                    <button class="tool-btn active" data-tool="bbox" title="Bounding Box (B)">
                        ⬜ BBox
                    </button>
                    <button class="tool-btn" data-tool="polygon" title="Polygon (P)">
                        🔷 Polygon
                    </button>
                    <button class="tool-btn" data-tool="select" title="Select (S)">
                        👆 Select
                    </button>
                </div>

                <div class="tool-group">
                    <button class="tool-btn" id="undoBtn" title="Undo (Ctrl+Z)">
                        ↶ Undo
                    </button>
                    <button class="tool-btn" id="clearBtn" title="Clear All">
                        🗑️ Clear
                    </button>
                </div>

                <div class="tool-group">
                    <button class="tool-btn" id="autoSaveBtn" title="Auto-save is ON">
                        💾 Auto-save ON
                    </button>
                    <button class="tool-btn" id="gridBtn" title="Toggle Grid (G)">
                        ⊞ Grid
                    </button>
                </div>
            </div>

            <div class="canvas-container">
                <div class="canvas-wrapper">
                    <canvas id="annotationCanvas"></canvas>
                    <div id="errorMessage" style="display:none;" class="error-message"></div>
                </div>

                <div class="nav-controls">
                    <button class="nav-btn" id="prevBtn" title="Previous (←)">← Previous</button>
                    <span class="image-counter">
                        <span id="currentIndex">1</span> / <span id="totalCount">0</span>
                    </span>
                    <button class="nav-btn" id="nextBtn" title="Next (→)">Next →</button>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="panel-section">
                <div class="panel-title">Classes</div>
                <div class="class-grid" id="classGrid">
                    <!-- Class buttons will be added here -->
                </div>
                <button class="class-manager-btn" id="manageClassesBtn">
                    ⚙️ Manage Classes
                </button>
            </div>

            <div class="panel-section">
                <div class="panel-title">Annotations</div>
                <div class="annotation-list" id="annotationList">
                    <!-- Annotation items will be added here -->
                </div>
            </div>

            <div class="panel-section">
                <div class="panel-title">Export</div>
                <div class="export-section">
                    <button class="export-btn" data-format="yolo">Export as YOLO</button>
                    <button class="export-btn" data-format="coco">Export as COCO JSON</button>
                    <button class="export-btn" data-format="voc">Export as Pascal VOC</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Class Management Modal -->
    <div id="classModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">📋 Manage Classes</div>
                <button class="modal-close" id="closeClassModal">&times;</button>
            </div>
            <div class="modal-body">
                <p style="color: var(--text-dim); margin-bottom: 15px;">
                    Add, remove, or reorder annotation classes. Changes sync with modelcub.yaml.
                </p>
                <div id="classList">
                    <!-- Class items will be added here -->
                </div>
                <div class="add-class-input">
                    <input type="text" id="newClassName" placeholder="Enter new class name..." />
                    <button id="addClassBtn">Add Class</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Keyboard Shortcuts Modal -->
    <div id="shortcutsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">⌨️ Keyboard Shortcuts</div>
                <button class="modal-close" id="closeShortcutsModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="shortcuts-grid" id="shortcutsGrid">
                    <!-- Shortcuts will be added here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-left">
            <div class="status-item">
                <div class="status-icon"></div>
                <span>Ready</span>
            </div>
            <div class="status-item">
                <span>Tool: <strong id="statusTool">BBox</strong></span>
            </div>
            <div class="status-item">
                <span>Class: <span class="class-badge" id="statusClass">None</span></span>
            </div>
        </div>
        <div class="status-right">
            <div class="status-item">
                <span>Press <strong>?</strong> for shortcuts</span>
            </div>
        </div>
    </div>

    <div class="shortcuts" id="shortcutsHint">
        ⌨️ Press ? for shortcuts
    </div>

    <script src="/static/annotation.js"></script>
    <script>
        // Enhance with status bar updates
        const originalSelectClass = AnnotationStudio.prototype.selectClass;
        AnnotationStudio.prototype.selectClass = function (cls, btn) {
            originalSelectClass.call(this, cls, btn);
            document.getElementById('statusClass').textContent = cls;
        };
    </script>
</body>

</html>
